# /etc/network-sniffer/config.conf

# Interfaz de red en la que capturar
INTERFACE="eth0"

# Directorios de instalación
STATE_DIR="/etc/network-sniffer"
LIB_DIR="$STATE_DIR/src/lib"
BUS_DIR="/tmp/network-sniffer"
LOG_DIR="/var/log/network-sniffer"
MODULES_DIR="$STATE_DIR/modules"

# Ficheros
SERVICE_LOG="/var/log/network-sniffer/service.log"
ERROR_LOG="/var/log/network-sniffer/error.log"
TMP_PROC_CONTEXT="/tmp/network-sniffer/proc_context.txt"

# Logrotate
LOGROTATE_SRC="../src/lib/logrotate/network-sniffer"
LOGROTATE_DEST="/etc/logrotate.d/network-sniffer"

# Sudoers
SUDOERS_FILE="/etc/sudoers.d/network-sniffer"

# Servicio
SERVICE_FILE="../src/lib/systemd/network-sniffer.service"
SERVICE_DEST="/etc/systemd/system/network-sniffer.service"
SERVICE_WEB_FILE="../src/lib/systemd/network-sniffer-web.service"
SERVICE_WEB_DEST="/etc/systemd/system/network-sniffer-web.service"

# Identidad
APP_USER="network-sniffer"
APP_GROUP="network-sniffer"
